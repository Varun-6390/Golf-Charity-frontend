<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Golf Ball -->
  <circle cx="250" cy="180" r="60" fill="#f5f5f5" stroke="#ccc" stroke-width="2"/>

  <!-- Tee -->
  <rect x="240" y="240" width="20" height="60" fill="#2e7d32"/>
  <polygon points="240,240 260,240 250,210" fill="#2e7d32"/>

  <!-- Crossed Clubs -->
  <line x1="150" y1="100" x2="350" y2="300" stroke="#555" stroke-width="6"/>
  <line x1="350" y1="100" x2="150" y2="300" stroke="#555" stroke-width="6"/>

  <!-- Text -->
  <text x="250" y="380" font-size="48" text-anchor="middle" fill="#1b5e20" font-family="Arial" font-weight="bold">
    GOLF
  </text>
  <text x="250" y="420" font-size="24" text-anchor="middle" fill="#1565c0" font-family="Arial">
    FOR CHARITY
  </text>

  <!-- Heart -->
  <text x="250" y="460" font-size="30" text-anchor="middle" fill="red">❤</text>
</svg>
